name: Release (Windows)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v0.1.1). Leave blank for a draft from current package.json.'
        required: false
        type: string

permissions:
  contents: write
  id-token: write       # cho attest-build-provenance
  attestations: write

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 60
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # Sparse registry: ~80% faster cargo deps download (Rust 1.68+, default in 1.70+)
      CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
      CARGO_NET_GIT_FETCH_WITH_CLI: 'true'
      # Skip Rust docs and avoid incremental compilation overhead on cold cache
      CARGO_INCREMENTAL: '0'
      RUST_BACKTRACE: short

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          # Share cache across tag/branch builds — only invalidates on Cargo.lock change
          shared-key: 'tauri-windows'
          save-if: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') }}

      - name: Install npm deps
        run: npm ci

      - name: Build Next static export
        run: npm run build

      - name: Build & sign Tauri (Windows)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          # Creates a draft GitHub Release if one matching the tag doesn't exist,
          # uploads installers + .sig files, and (on tag push) publishes it.
          tagName: ${{ github.event.inputs.version || github.ref_name }}
          releaseName: 'RedDash ${{ github.event.inputs.version || github.ref_name }}'
          releaseBody: 'See the assets to download and install this version. Auto-update enabled via `latest.json`.'
          releaseDraft: true
          prerelease: false
          # Default `tauri build` covers both MSI and NSIS installers on Windows.
          args: ''

      - name: Stage portable build
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          mkdir -p release
          RAW=$(find src-tauri/target/release -maxdepth 1 -type f -name '*.exe' | head -1)
          if [ -z "$RAW" ]; then
            echo "No raw .exe found in src-tauri/target/release/" >&2
            ls -la src-tauri/target/release/ >&2
            exit 1
          fi
          echo "Found raw binary: $RAW"
          cp "$RAW" "release/RedDash-${VERSION}-portable.exe"
          ls -lh release/

      - name: Generate latest.json
        shell: bash
        run: node scripts/make-release.mjs --notes "RedDash $(node -p \"require('./package.json').version\")"

      - name: Compute SHA256 checksums
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          cd src-tauri/target/release/bundle
          {
            find msi -type f -name '*.msi' 2>/dev/null
            find nsis -type f -name '*-setup.exe' 2>/dev/null
          } | while read -r f; do
            sha256sum "$f"
          done > "$GITHUB_WORKSPACE/release/SHA256SUMS.txt"
          cd "$GITHUB_WORKSPACE"
          sha256sum "release/RedDash-${VERSION}-portable.exe" >> release/SHA256SUMS.txt
          cat release/SHA256SUMS.txt

      - name: Upload portable + latest.json + checksums
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          files: |
            release/latest.json
            release/RedDash-*-portable.exe
            release/SHA256SUMS.txt
          draft: true

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*-setup.exe
            release/RedDash-*-portable.exe
